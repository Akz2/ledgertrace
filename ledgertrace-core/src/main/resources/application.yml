server:
  port: 8081

spring:
  application:
    name: ledgertrace-core

  datasource:
    url: jdbc:postgresql://localhost:5432/ledgertrace_db
    username: admin
    password: secret_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics